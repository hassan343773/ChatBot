<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .chat-container {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
        }
        .agent-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .agent-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #7c3aed;
            border-radius: 12px;
            background: transparent;
            color: #a78bfa;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
            text-align: center;
        }
        .agent-btn.active {
            background: #7c3aed;
            color: white;
        }
        .agent-btn:hover { background: #7c3aed; color: white; }

        .chat-box {
            background: #1a1a2e;
            border: 1px solid #7c3aed;
            border-radius: 16px;
            height: 450px;
            overflow-y: auto;
            padding: 20px;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message.user { flex-direction: row-reverse; }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .avatar.ai   { background: #7c3aed; }
        .avatar.user { background: #0ea5e9; }

        .bubble-wrap { display: flex; flex-direction: column; max-width: 70%; }
        .message.user .bubble-wrap { align-items: flex-end; }

        .bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.ai   .bubble {
            background: #2d2d4e;
            color: #e2e8f0;
            border-top-left-radius: 4px;
        }
        .message.user .bubble {
            background: #7c3aed;
            color: white;
            border-top-right-radius: 4px;
        }

        .timestamp {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 4px;
            padding: 0 4px;
        }

        /* Typing animation */
        .typing-bubble {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 14px 18px;
            background: #2d2d4e;
            border-radius: 16px;
            border-top-left-radius: 4px;
            width: fit-content;
        }
        .dot {
            width: 8px; height: 8px;
            background: #a78bfa;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30%            { transform: translateY(-8px); }
        }

        .input-row {
            display: flex;
            gap: 10px;
        }
        .input-row textarea {
            flex: 1;
            resize: none;
            height: 50px;
            padding: 12px;
            border-radius: 12px;
        }
        .input-row button {
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 1.1rem;
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .chat-header h2 { margin: 0; color: #a78bfa; }
        .status-dot {
            width: 10px; height: 10px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.4; }
        }

        .clear-btn {
            background: transparent;
            border: 1px solid #7c3aed;
            color: #a78bfa;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-left: auto;
        }
        .clear-btn:hover { background: #7c3aed; color: white; }
    </style>
</head>
<body>
    <nav><h1>🤖 AI Project</h1></nav>

    <div class="chat-container">
        <a href="/" class="back">← Back to Home</a>

        <div class="chat-header">
            <div class="status-dot"></div>
            <h2 id="agentTitle">🧠 Education Agent</h2>
            <button class="clear-btn" onclick="clearChat()">🗑 Clear Chat</button>
        </div>

        <!-- Agent Selector -->
        <div class="agent-selector">
            <div class="agent-btn active" onclick="selectAgent(this, 'Education Agent', '🧠')">
                📚 Education Agent
            </div>
            <div class="agent-btn" onclick="selectAgent(this, 'Creative Agent', '🎨')">
                🎨 Creative Agent
            </div>
            <div class="agent-btn" onclick="selectAgent(this, 'Technical Agent', '💻')">
                💻 Technical Agent
            </div>
        </div>

        <!-- Chat Box -->
        <div class="chat-box" id="chatBox">
            <div class="message ai">
                <div class="avatar ai">🧠</div>
                <div class="bubble-wrap">
                    <div class="bubble">Hello! I am your Education Agent. Ask me anything and I will explain it clearly! 😊</div>
                    <div class="timestamp">Just now</div>
                </div>
            </div>
        </div>

        <!-- Input -->
        <div class="input-row">
            <textarea id="userInput" placeholder="Type your message..." onkeydown="handleKey(event)"></textarea>
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        let currentAgent = 'Education Agent';
        let currentEmoji = '🧠';

        const agentGreetings = {
            'Education Agent': '🧠 Hello! I am your Education Agent. Ask me anything and I will explain it clearly! 😊',
            'Creative Agent':  '🎨 Hello! I am your Creative Agent. Let your imagination run wild! ✨',
            'Technical Agent': '💻 Hello! I am your Technical Agent. Ask me any coding or tech question! 🔧'
        };

        function getTime() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function selectAgent(btn, agentName, emoji) {
            document.querySelectorAll('.agent-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentAgent = agentName;
            currentEmoji = emoji;
            document.getElementById('agentTitle').innerText = emoji + ' ' + agentName;
            clearChat();
        }

        function clearChat() {
            const box = document.getElementById('chatBox');
            box.innerHTML = '';
            addMessage('ai', agentGreetings[currentAgent], currentEmoji);
        }

        function addMessage(type, text, emoji) {
            const box   = document.getElementById('chatBox');
            const div   = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = `
                <div class="avatar ${type}">${type === 'ai' ? emoji : '👤'}</div>
                <div class="bubble-wrap">
                    <div class="bubble">${text}</div>
                    <div class="timestamp">${getTime()}</div>
                </div>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function showTyping() {
            const box = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = 'message ai';
            div.id = 'typingIndicator';
            div.innerHTML = `
                <div class="avatar ai">${currentEmoji}</div>
                <div class="bubble-wrap">
                    <div class="typing-bubble">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                </div>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function removeTyping() {
            const t = document.getElementById('typingIndicator');
            if (t) t.remove();
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text  = input.value.trim();
            if (!text) return;

            addMessage('user', text, '👤');
            input.value = '';
            showTyping();

            try {
                const res  = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, agent: currentAgent })
                });
                const data = await res.json();
                removeTyping();
                addMessage('ai', data.response, currentEmoji);
            } catch (err) {
                removeTyping();
                addMessage('ai', '❌ Something went wrong. Please try again.', currentEmoji);
            }
        }
    </script>
</body>
</html>
